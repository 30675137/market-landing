name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build ecommerce-ai
        working-directory: pages/ecommerce-ai
        run: npm ci && npm run build

      - name: Build ai-consultant
        working-directory: pages/ai-consultant
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/ecommerce-ai _site/ai-consultant
          cp -r pages/ecommerce-ai/dist/* _site/ecommerce-ai/
          cp -r pages/ai-consultant/dist/* _site/ai-consultant/
          cp deploy/index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
